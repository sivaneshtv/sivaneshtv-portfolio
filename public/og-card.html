<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  @font-face {
    font-family: 'Caveat';
    src: url('/fonts/Caveat[wght].woff2') format('woff2');
    font-weight: 400 700;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/JetBrainsMono[wght].woff2') format('woff2');
    font-weight: 300 500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #1a1a1c; }

  .card {
    width: 1200px;
    height: 630px;
    background: #1a1a1c;
    position: relative;
    overflow: hidden;
  }

  /* Subtle dot grid — workbench texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* Ghosted S — right side texture */
  .deco-s {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-52%);
    font-family: 'Caveat', cursive;
    font-size: 680px;
    font-weight: 700;
    color: #e84a3f;
    opacity: 0.055;
    line-height: 1;
    user-select: none;
    letter-spacing: -20px;
  }

  /* Left edge red accent bar */

  /* Main content */
  .content {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #4a4945;
    margin-bottom: 20px;
  }

  .name {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 118px;
    line-height: 0.95;
    color: #f0ece4;
    letter-spacing: -1px;
  }

  .name .comma { color: #f0ece4; }
  .name .tv { color: #e84a3f; font-style: italic; }

  .tagline {
    margin-top: 10px;
    font-family: 'Caveat', cursive;
    font-weight: 400;
    font-size: 50px;
    line-height: 1.15;
    color: #5e5a52;
  }

  .tagline .strike {
    text-decoration: line-through;
    text-decoration-color: rgba(232, 74, 63, 0.6);
    text-decoration-thickness: 2px;
    color: #3a3835;
  }

  .tagline .ships {
    color: #e84a3f;
    font-style: italic;
  }

  /* Avail badge */
  .badge {
    margin-top: 30px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px dashed rgba(232,74,63,.3);
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(232,74,63,.8);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a9d5f;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(74,157,95,.6);
  }

  /* Bottom strip */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    border-top: 1px solid #242426;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    z-index: 1;
  }

  .bottom-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #2e2e30;
  }

  .bottom-domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: #4a4945;
  }

  .bottom-domain span {
    color: #e84a3f;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="deco-s">S</div>

  <div class="content">
    <div class="eyebrow">— product designer · Chennai, IN</div>
    <div class="name">Sivanesh <span class="tv">TV</span><span class="comma">,</span></div>
    <div class="tagline">
      a designer who <span class="strike">talks</span> <span class="ships">ships.</span>
    </div>
    <div class="badge">
      <span class="dot"></span>
      Taking briefs · Q2 '26
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-desc">Safety-critical systems · Fleet tools · Infrastructure · Chennai</div>
    <div class="bottom-domain">sivanesh<span>.tv</span></div>
  </div>
</div>
</body>
</html>
